paths:
  /bookings.json:
    get:
      tags:
      - Booking Endpoints
      summary: All bookings
      description: Returns all non-cancelled bookings with optional sorting and pagination support.
      operationId: getBookings
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/booking'
        "401":
          description: Unauthorized - Invalid API key
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: sort_by
        in: query
        required: false
        description: Field to sort by
        schema:
          type: string
          enum:
          - created_at
          - updated_at
          - start_at
          - end_at
          - customer_name
          - room_name
          default: created_at
        example: "created_at"
      - name: sort_order
        in: query
        required: false
        description: Sort order (ascending or descending)
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
        example: "desc"
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          minimum: 1
          default: 1
        example: 1
      - name: per_page
        in: query
        required: false
        description: Number of items per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
        example: 25
    post:
      tags:
      - Booking Endpoints
      summary: Create a booking
      description: |
        Create a new booking on Jammed as an admin.

        This creates a booking in the same way as a staff member would from the admin dashboard.

        You must provide **booking_details** with at least a `start_at`, `end_at`, `room_id`, and `price`.

        For the customer, you can either:
        - Provide a `customer_id` to book for an existing customer
        - Provide `customer_details` with `name` and `email` to create a new customer inline

        Optionally provide `band_details` with a `name` to associate a group/band, and `extra_ids` to add extras to the booking.

        The booking is created with source `manually_added` and platform `api_v2`.
      operationId: createBooking
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/booking'
        "401":
          description: Unauthorized - Invalid API key
        "422":
          description: Unprocessable - the booking parameters you provided are invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unprocessable_error'
      requestBody:
        description: Create a new booking in Jammed
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/booking_create'
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"

  /bookings/{code}.json:
    get:
      tags:
      - Booking Endpoints
      summary: Find a booking by code
      description: Returns booking with the given code
      operationId: getBooking
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/booking'
        "401":
          description: Unauthorized - Invalid API key
        "404":
          description: Not found - Booking was not found
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: code
        in: path
        required: true
        schema:
          type: string
        description: The booking code
    patch:
      tags:
      - Booking Endpoints
      summary: Update a booking
      description: |
        Update an existing booking as an admin.

        This uses the same booking update flow as staff members would from the admin dashboard.

        You can update various booking details including time, room, pricing, customer information,
        and other booking attributes.

        The booking is identified by its code (same as the GET endpoint).
      operationId: updateBooking
      responses:
        "200":
          description: Booking updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/booking'
        "401":
          description: Unauthorized - Invalid API key
        "404":
          description: Not found - Booking was not found
        "422":
          description: Unprocessable - the booking parameters you provided are invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unprocessable_error'
      requestBody:
        description: Update booking details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/booking_update'
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: code
        in: path
        required: true
        schema:
          type: string
        description: The booking code

  /bookings/cancelled.json:
    get:
      tags:
      - Booking Endpoints
      summary: Cancelled bookings
      description: Returns all cancelled bookings, ordered by cancellation date descending. Supports pagination.
      operationId: getBookingsCancelled
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/booking'
        "401":
          description: Unauthorized - Invalid API key
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"

  /bookings/started.json:
    get:
      tags:
      - Booking Endpoints
      summary: Started bookings
      description: Returns all upcoming bookings (starting in the future), ordered by start time descending. Supports 
        pagination.
      operationId: getBookingsStarted
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/booking'
        "401":
          description: Unauthorized - Invalid API key
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"

  /bookings/finished.json:
    get:
      tags:
      - Booking Endpoints
      summary: Finished bookings
      description: Returns all bookings that have not yet ended, ordered by start time descending. Supports pagination.
      operationId: getBookingsFinished
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/booking'
        "401":
          description: Unauthorized - Invalid API key
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"

  /bookings/reminder.json:
    get:
      tags:
      - Booking Endpoints
      summary: Reminder bookings
      description: Returns all bookings starting 24 hours or more from now, ordered by start time descending. Matches 
        the reminder webhook window.
      operationId: getBookingsReminder
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/booking'
        "401":
          description: Unauthorized - Invalid API key
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"

  /bookings/one_hour_before.json:
    get:
      tags:
      - Booking Endpoints
      summary: One hour before bookings
      description: Returns all bookings starting 1 hour or more from now, ordered by start time descending. Matches the 
        one_hour_before webhook window.
      operationId: getBookingsOneHourBefore
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/booking'
        "401":
          description: Unauthorized - Invalid API key
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"

  /bookings/updated.json:
    get:
      tags:
      - Booking Endpoints
      summary: Updated bookings
      description: Returns all non-cancelled bookings, ordered by last updated date descending. Useful for polling for 
        recently changed bookings.
      operationId: getBookingsUpdated
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/booking'
        "401":
          description: Unauthorized - Invalid API key
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"

  /bookings/{code}/transactions.json:
    get:
      tags:
      - Booking Endpoints
      summary: List booking transactions
      description: |
        Returns all money log transactions for the specified booking, ordered by most recent first.

        This includes payments, refunds, credit notes, and other financial transactions
        associated with the booking.
      operationId: getBookingTransactions
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/money_log'
        "401":
          description: Unauthorized - Invalid API key
        "404":
          description: Not found - Booking was not found
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: code
        in: path
        required: true
        schema:
          type: string
        description: The booking code
    post:
      tags:
      - Booking Endpoints
      summary: Create a transaction for a booking
      description: |
        Create a new transaction (money log entry) for the specified booking.

        This creates a credit note transaction with the specified amount and description.
        The transaction will be associated with the booking and its customer.

        All amounts should be provided as positive integers in the smallest currency unit
        (cents/pence) - e.g., £10.50 should be provided as 1050.
      operationId: createBookingTransaction
      responses:
        "201":
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/money_log'
        "401":
          description: Unauthorized - Invalid API key
        "404":
          description: Not found - Booking was not found
        "422":
          description: Unprocessable - the transaction parameters you provided are invalid
      requestBody:
        description: Create a new transaction for the booking
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/transaction_create'
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: code
        in: path
        required: true
        schema:
          type: string
        description: The booking code

  /bookings/{code}/studio_notes.json:
    get:
      tags:
      - Booking Endpoints
      summary: Get booking studio notes
      description: |
        Returns the studio notes for the specified booking.

        Studio notes are internal notes that studios can add to bookings for their own reference.
        These are not visible to customers.
      operationId: getBookingStudioNotes
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  studio_notes:
                    type: string
                    description: The studio notes text
                    nullable: true
        "401":
          description: Unauthorized - Invalid API key
        "404":
          description: Not found - Booking was not found
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: code
        in: path
        required: true
        schema:
          type: string
        description: The booking code
    patch:
      tags:
      - Booking Endpoints
      summary: Update booking studio notes
      description: |
        Update the studio notes for the specified booking.

        Studio notes are internal notes that studios can add to bookings for their own reference.
        These are not visible to customers.
      operationId: updateBookingStudioNotes
      responses:
        "200":
          description: Studio notes updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  studio_notes:
                    type: string
                    description: The updated studio notes text
                    nullable: true
        "401":
          description: Unauthorized - Invalid API key
        "404":
          description: Not found - Booking was not found
      requestBody:
        description: Update studio notes for the booking
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/studio_notes_update'
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: code
        in: path
        required: true
        schema:
          type: string
        description: The booking code

  /customers.json:
    get:
      tags:
      - Customer Endpoints
      summary: Find all customers
      description: Returns all customers
      operationId: getCustomers
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/customer'
        "401":
          description: Unauthorized - Invalid API key
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
    post:
      tags:
      - Customer Endpoints
      summary: Create a customer
      description: |
        Create a new customer on Jammed.

        With a new customer, you must at least provide an **name** and **email address**.

        You can also issue `actions` to the endpoint, to create and invite the customer to set a password - Jammed will then send them an email from your account with a link to set their password.

        You can't create a customer with an email address that already exists as a registered customer on Jammed. You can create a customer with an email address that already exists, so long as the customer is not yet registered on Jammed.

        **Jammed API doesn't accept passwords for customer creation process** - they must be set by the customer themselves in the invitation process to verify the email and to improve security.
      operationId: createCustomer
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/customer'
        "401":
          description: Unauthorized - Invalid API key
        "422":
          description: Unprocessable - the customer parameters you provided are invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unprocessable_error'

      requestBody:
        description: Create a new customer in Jammed
        required: true
        content:
          form-data:
            schema:
              $ref: '#/components/schemas/customer_create'
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"

  /customers/{id}.json:
    get:
      tags:
      - Customer Endpoints
      summary: Find a customer by ID
      description: Returns customer with the given ID
      operationId: getCustomer
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer'
        "401":
          description: Unauthorized - Invalid API key
        "404":
          description: Not found - Customer was not found
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: id
        in: path
        required: true
        schema:
          type: integer

  /coupons/{id}.json:
    get:
      tags:
      - Coupon Endpoints
      summary: Find a coupon by ID
      description: Returns coupon with the given ID
      operationId: getCoupon
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coupon'
        "401":
          description: Unauthorized - Invalid API key
        "404":
          description: Not found - Coupon was not found
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: id
        in: path
        required: true
        schema:
          type: integer

  /coupons.json:
    get:
      tags:
      - Coupon Endpoints
      summary: Find all coupons
      description: Returns all coupons
      operationId: getCoupons
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/coupon'
        "401":
          description: Unauthorized - Invalid API key
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
    post:
      tags:
      - Coupon Endpoints
      summary: Create a coupon
      description: |
        Create a new coupon on Jammed.

        With a new coupon, you must at least provide an **name**, **amount** and **discount_type**.

        `discount type` is either `fixed_amount`, or `percentage` - and `amount` is in pence/cents or whole pencentage points.

        Once created, a Coupon can be used by staff members only on a booking. To allow customers to use the Coupon, you need to generate Promocode for the Coupon.
      operationId: createCoupon
      responses:
        "201":
          description: Coupon created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coupon'
        "401":
          description: Unauthorized - Invalid API key
        "422":
          description: Unprocessable - the coupon parameters you provided are invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unprocessable_error'
      requestBody:
        description: Create a new coupon in Jammed
        required: true
        content:
          form-data:
            schema:
              $ref: '#/components/schemas/coupon_create'
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"

  /coupons/{coupon_id}/promocodes.json:
    get:
      tags:
      - Promocode Endpoints
      summary: Find all promocodes
      description: Returns all promocodes
      operationId: getPromocodes
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/promocode'
        "401":
          description: Unauthorized - Invalid API key
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: coupon_id
        description: Coupon ID to list the promocodes for
        in: path
        required: true
        schema:
          type: integer
        example: 123
    post:
      tags:
      - Promocode Endpoints
      summary: Create a promocode
      description: |
        Create a promocode for a coupon

        You can provide the API with a **code**, but if you don't we'll generate one for you.

        You can just `POST` an empty body to create a promocode for a coupon with a generated code.

        With promocodes you can specify minimum booking values, redemptions limits, limit only to one customer, and limit one use per customer.

        Once created, a Promocode can be used to apply the Coupon to a booking via the customer booking form
      operationId: createPromocode
      responses:
        "201":
          description: Promocode created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/promocode'
        "401":
          description: Unauthorized - Invalid API key
        "422":
          description: Unprocessable - the promocode parameters you provided are invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unprocessable_error'
      requestBody:
        description: Create a new promocode in Jammed
        required: true
        content:
          form-data:
            schema:
              $ref: '#/components/schemas/promocode_create'
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: coupon_id
        description: Coupon ID to create promocode for
        in: path
        required: true
        schema:
          type: integer
        example: 123

  /coupons/{coupon_id}/assign_to_customer.json:
    post:
      tags:
      - Coupon Endpoints
      summary: Assign Coupon to Customer
      description: |
        Assign a Coupon to a Customer

        Using the Coupon ID and a Customer ID, we can assign a Coupon to a Customer

        This will mean that the Customer will automatically be able to use the Coupon when booking without the use of a promocode
      operationId: assignPromocode
      responses:
        "201":
          description: Promocode assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/promocode'
        "401":
          description: Unauthorized - Invalid API key
        "422":
          description: Coupon has already been assigned to this Customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unprocessable_error'
      requestBody:
        description: Assign a Coupon to a Customer
        required: true
        content:
          form-data:
            schema:
              $ref: '#/components/schemas/coupon_assign_to_customer'
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: "Bearer <api_key>"
      - name: coupon_id
        description: Coupon ID to create promocode for
        in: path
        required: true
        schema:
          type: integer
        example: 123
  /groups.json:
    get:
      tags:
      - Group Endpoints
      summary: Find all groups
      description: Returns all groups
      operationId: getGroups
      responses:
        "200":
          description: successful operation
