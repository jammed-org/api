    # ePOS schemas
  parameters:
    authHeader:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
      example: "Bearer <api_key>"
    bookingCode:
      name: code
      in: path
      required: true
      schema:
        type: string
      description: Booking code
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    perPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

  securitySchemes:
    apiKey:
      type: apiKey
      name: "Authorization: 'Bearer <api-key>'"
      in: header
      description: |
        Issue a http header with the key 'Authorization' and value 'Bearer api_key'
