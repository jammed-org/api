                        type: boolean
                      bookable_staff:
                        type: boolean
                      approval_required:
                        type: boolean
                      enquiries:
                        type: boolean
                      memberships:
                        type: boolean
                      smart_lock_provider:
                        type: string
                        nullable: true
                        description: Smart lock provider name, or null if not configured
                  wordings:
                    type: object
                    description: Custom terminology for the studio
                    properties:
                      customer:
                        type: string
                        description: What the studio calls customers (default 'customer')
                      group:
                        type: string
                        description: What the studio calls groups (default 'group')
                      room:
                        type: string
                        description: What the studio calls rooms (default 'room')
                  usage:
                    type: object
                    description: Subsystem usage flags — true if the studio has data in that subsystem
                    properties:
                      extras:
                        type: boolean
                      recording_sessions:
                        type: boolean
                      audio_uploads:
                        type: boolean
                      custom_questions:
                        type: boolean
                      regular_bookings:
                        type: boolean
                      coupons:
                        type: boolean
                      credit_balance:
                        type: boolean
                      multi_location:
                        type: boolean
                      locations:
                        type: boolean
                  payments:
